# ════════════════════════════════════════════════════════════════════
# NTG Reporting Dashboard - Spring Boot Configuration
# ════════════════════════════════════════════════════════════════════

# ── Server Configuration ─────────────────────────────────────────────
server.port=8080
server.servlet.context-path=/
server.error.include-message=always
server.error.include-binding-errors=always

# ── Spring Boot ──────────────────────────────────────────────────────
spring.application.name=ntg-reporting-dashboard
spring.profiles.active=production

# ── File Upload Configuration ────────────────────────────────────────
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
spring.servlet.multipart.enabled=true
spring.servlet.multipart.file-size-threshold=1MB

# ── Output Paths (Windows) ───────────────────────────────────────────
# Change these paths to match your system
app.output.directory=C:\\Users\\Thevindu.Aditya\\Desktop\\The end result
app.console.directory=C:\\Users\\Thevindu.Aditya\\Desktop\\Console
app.powerbi.template=C:\\Users\\Thevindu.Aditya\\Desktop\\NTG_Dashboard.pbit
app.dashboard.filename=NTG_2025_Dashboard.xlsx

# ── Logging Configuration ────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.ntg.reporting=DEBUG
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/dashboard.log
logging.file.max-size=10MB
logging.file.max-history=10

# ── CORS Configuration ───────────────────────────────────────────────
cors.allowed-origins=http://localhost:3000,http://localhost:8080,http://127.0.0.1:8080,*
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.max-age=3600

# ── Dashboard Service Configuration ──────────────────────────────────
dashboard.watcher.enabled=true
dashboard.watcher.interval=5000
dashboard.watcher.retry-attempts=3
dashboard.entities.count=9
dashboard.mappings.total=23600
dashboard.months.fiscal-year=2025
dashboard.months.total=12

# ── Data Processing ──────────────────────────────────────────────────
processing.batch-size=100
processing.timeout-seconds=300
processing.retry-enabled=true
processing.retry-attempts=3

# ── Jackson Configuration (JSON) ─────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.indent-output=true
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.default-property-inclusion=non_null

# ── Actuator (Monitoring) ────────────────────────────────────────────
management.endpoints.web.exposure.include=health,metrics,info
management.endpoint.health.show-details=always
management.metrics.enable.jvm=true
management.metrics.enable.process=true
management.metrics.enable.system=true

# ── Thread Pool Configuration ────────────────────────────────────────
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=8
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=dashboard-

# ── Application Info ────────────────────────────────────────────────
app.name=NTG Reporting Dashboard
app.version=1.0.0
app.description=Automated financial & accounting dashboard system
app.author=Thevindu Aditya
